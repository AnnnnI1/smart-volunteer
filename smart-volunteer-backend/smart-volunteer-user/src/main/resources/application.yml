server:
  port: 9091

spring:
  application:
    name: smart-volunteer-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_volunteer?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: userstest
    password: YOUR_DB_PASSWORD
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: http://oss-cn-beijing.aliyuncs.com
    access-key-id: YOUR_ALIYUN_ACCESS_KEY_ID
    access-key-secret: YOUR_ALIYUN_ACCESS_KEY_SECRET
    bucket-name: yyxtest

# Python AI 微服务地址
python:
  ai:
    url: http://localhost:9094
